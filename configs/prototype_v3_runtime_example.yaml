config_version: "v0"

scenario:
  id: "prototype_vendor_pop_v1"
  seed: 424242
  market_id: "market_local_v0"
  start_date: "2026-01-01"

simulation:
  # Interactive timing: 10s total tick, 9.5s intake window.
  # (The test fixture variant uses 0/1 for fast hermetic runs.)
  tick_wall_clock_base_ms: 10000
  debug_history_max_ticks: 30
  debug_history_default_ticks: 7
  intake_window_ms: 9500
  agent_method_order: ["Onboard", "Transact"]
  agent_iteration_policy: "stable_sorted_ids"
  count_rounding_mode: "half_up"
  amount_scale_dp: 2
  amount_rounding_mode: "half_up"

money:
  amount_rounding_mode: "half_up"
  default_currency: "USD"
  enforce_money_object: true

pipeline:
  pipeline_schema_version: "v3_runtime"
  pipeline_profiles:
    # Vendor Alpha — prepaid card issuer (spec 40 §v3 runtime schema + v4 extensions).
    - pipeline_profile_id: "prepaid_card_pipeline"
      transaction_intents:
        - intent_id: "Transact-Purchase-Clearing"
          destinations:
            - destination_role: "scheme_access_product"
              outgoing_intent_id: "Transact-Purchase-Clearing-Scheme"
              value_date_policy: "same_day"
              value_date_offset_days: 0
              amount_basis: "transaction_intent_amount"
              currency_mode: "inherit"
              routing_completion_mode: "synchronous"
            - destination_role: "processor_services_product"
              outgoing_intent_id: "Transact-Purchase-Clearing-Processor"
              value_date_policy: "same_day"
              value_date_offset_days: 0
              amount_basis: "transaction_intent_amount"
              currency_mode: "inherit"
              routing_completion_mode: "synchronous"
        # Refund leg routing/execution contract only. Per ADR-0003, behavior-
        # generation knobs live on Pop (`world.pops[].refund_to_purchase_ratio`)
        # — pipeline must NOT carry source_volume_ratio or any equivalent
        # coefficient (spec 40 §pipeline + spec 50
        # §E_PIPELINE_BEHAVIOR_FIELD_FORBIDDEN).
        - intent_id: "Transact-Purchase-Refund-Clearing"
          destinations:
            - destination_role: "scheme_access_product"
              outgoing_intent_id: "Transact-Purchase-Refund-Scheme"
              value_date_policy: "same_day"
              value_date_offset_days: 0
              amount_basis: "transaction_intent_amount"
              currency_mode: "inherit"
              routing_completion_mode: "synchronous"
            - destination_role: "processor_services_product"
              outgoing_intent_id: "Transact-Purchase-Refund-Processor"
              value_date_policy: "same_day"
              value_date_offset_days: 0
              amount_basis: "transaction_intent_amount"
              currency_mode: "inherit"
              routing_completion_mode: "synchronous"
      ledger_construction:
        - ledger_ref: "customer_funds"
          path_pattern: "[Funds][{product_role}][Customer]"
        - ledger_ref: "settlement_funds"
          path_pattern: "[Funds][{product_role}][Settlement]"
        - ledger_ref: "own_funds"
          path_pattern: "[Funds][OwnFunds][{self_agent}]"
      posting_rules:
        - trigger_id: "Transact-Purchase-Clearing"
          source_ledger_ref: "customer_funds"
          destination_ledger_ref: "settlement_funds"
          amount_basis: "transaction_intent_amount"
          value_date_policy: "same_day"
        - trigger_id: "Transact-Purchase-Refund-Clearing"
          source_ledger_ref: "settlement_funds"
          destination_ledger_ref: "customer_funds"
          amount_basis: "transaction_intent_amount"
          value_date_policy: "same_day"
        - trigger_id: "fee_issuer_cardholder_2pct"
          source_ledger_ref: "settlement_funds"
          destination_ledger_ref: "own_funds"
          amount_basis: "fee_amount"
          value_date_policy: "same_day"
      value_container_construction:
        - container_ref: "customer_funds_container"
          path_pattern: "[Container][{product_role}][Customer]"
        - container_ref: "settlement_funds_container"
          path_pattern: "[Container][{product_role}][Settlement]"
        - container_ref: "own_funds_container"
          path_pattern: "[Container][Own-Funds][{self_agent}]"
      asset_transfer_rules:
        - trigger_id: "Transact-Purchase-Clearing"
          source_container_ref: "customer_funds_container"
          destination_container_ref: "settlement_funds_container"
          amount_basis: "transaction_intent_amount"
          value_date_policy: "same_day"
        - trigger_id: "Transact-Purchase-Refund-Clearing"
          source_container_ref: "settlement_funds_container"
          destination_container_ref: "customer_funds_container"
          amount_basis: "transaction_intent_amount"
          value_date_policy: "same_day"
        - trigger_id: "fee_issuer_cardholder_2pct"
          source_container_ref: "settlement_funds_container"
          destination_container_ref: "own_funds_container"
          amount_basis: "fee_amount"
          value_date_policy: "same_day"
          value_date_offset_days: 0
      fee_sequences:
        - sequence_id: "issuer_cardholder_fee_sequence"
          fees:
            # Spec 33 §Cardholder fee statement rule: non-payable advisement.
            - fee_id: "fee_issuer_cardholder_2pct"
              trigger_ids: ["Transact-Purchase-Clearing"]
              beneficiary_role: "self_agent"
              beneficiary_product_role: "product_role"
              payer_role: "cardholder_counterparty"
              non_payable_statement: true
              invoice_issue_date_policy: "next_month_day_plus_x"
              invoice_issue_date_offset_days: 1
              payment_due_date_policy: "same_day"
              payment_due_date_offset_days: 0
              settlement_value_date_policy: "same_day"
              settlement_value_date_offset_days: 0
              settlement_trigger_event: "invoice_transaction_event"
              amount_percentage: 0.02
      settlement_demand_sequences: []
      settlement_payment_policies:
        - applies_to_category: "fee"
          source_container_ref: "own_funds_container"
          auto_pay_enabled: true
          hold_default: false
        - applies_to_category: "settlement_demand"
          source_container_ref: "settlement_funds_container"
          auto_pay_enabled: true
          hold_default: false
      ledger_value_container_map:
        - ledger_ref: "settlement_funds"
          container_ref: "settlement_funds_container"
          mapping_mode: "aggregate"

    - pipeline_profile_id: "scheme_access_pipeline"
      transaction_intents: []
      ledger_construction:
        - ledger_ref: "scheme_fee_receivable"
          path_pattern: "[Receivables][{self_product}][From-{payer_role}]"
      posting_rules:
        - trigger_id: "fee_scheme_access"
          source_ledger_ref: "scheme_fee_receivable"
          destination_ledger_ref: "scheme_fee_receivable"
          amount_basis: "fee_amount"
          value_date_policy: "next_month_day_plus_x"
          value_date_offset_days: 5
        - trigger_id: "fee_scheme_access_refund"
          source_ledger_ref: "scheme_fee_receivable"
          destination_ledger_ref: "scheme_fee_receivable"
          amount_basis: "fee_amount"
          value_date_policy: "next_month_day_plus_x"
          value_date_offset_days: 5
      value_container_construction:
        - container_ref: "scheme_settlement_container"
          path_pattern: "[Container][{self_product}][Settlement]"
      asset_transfer_rules: []
      fee_sequences:
        - sequence_id: "scheme_fee_sequence"
          fees:
            - fee_id: "fee_scheme_access"
              trigger_ids: ["Transact-Purchase-Clearing-Scheme"]
              beneficiary_role: "self_agent"
              beneficiary_product_role: "self_product"
              payer_role: "payer_role"
              invoice_issue_date_policy: "next_month_day_plus_x"
              invoice_issue_date_offset_days: 0
              payment_due_date_policy: "next_month_day_plus_x"
              payment_due_date_offset_days: 5
              settlement_value_date_policy: "next_month_day_plus_x"
              settlement_value_date_offset_days: 5
              settlement_trigger_event: "invoice_transaction_event"
              count_cost:
                amount: 0.01
                currency: "USD"
              amount_percentage: 0.0015
            - fee_id: "fee_scheme_access_refund"
              trigger_ids: ["Transact-Purchase-Refund-Scheme"]
              beneficiary_role: "self_agent"
              beneficiary_product_role: "self_product"
              payer_role: "payer_role"
              invoice_issue_date_policy: "next_month_day_plus_x"
              invoice_issue_date_offset_days: 0
              payment_due_date_policy: "next_month_day_plus_x"
              payment_due_date_offset_days: 5
              settlement_value_date_policy: "next_month_day_plus_x"
              settlement_value_date_offset_days: 5
              settlement_trigger_event: "invoice_transaction_event"
              count_cost:
                amount: 0.01
                currency: "USD"
      settlement_demand_sequences:
        - sequence_id: "scheme_settlement_demand_sequence"
          settlement_demands:
            - settlement_demand_id: "sd_scheme_purchase_clearing"
              trigger_ids: ["Transact-Purchase-Clearing-Scheme"]
              creditor_role: "self_agent"
              debtor_role: "payer_role"
              invoice_category: "settlement_demand"
              invoice_issue_date_policy: "same_day"
              invoice_issue_date_offset_days: 0
              payment_due_date_policy: "next_working_day_plus_x"
              payment_due_date_offset_days: 0
              amount_percentage: 1.0
            # Refund direction: source-derived; demand accrues 100% of refund
            # intent's already-scaled volume (spec 73 §R1).
            - settlement_demand_id: "sd_scheme_refund_clearing"
              trigger_ids: ["Transact-Purchase-Refund-Scheme"]
              creditor_role: "payer_role"
              debtor_role: "self_agent"
              invoice_category: "settlement_demand"
              invoice_issue_date_policy: "same_day"
              invoice_issue_date_offset_days: 0
              payment_due_date_policy: "next_working_day_plus_x"
              payment_due_date_offset_days: 0
              amount_percentage: 1.0
      settlement_payment_policies:
        - applies_to_category: "settlement_demand"
          source_container_ref: "scheme_settlement_container"
          auto_pay_enabled: true
          hold_default: false
      ledger_value_container_map: []

    - pipeline_profile_id: "processor_services_pipeline"
      transaction_intents: []
      ledger_construction:
        - ledger_ref: "processor_fee_receivable"
          path_pattern: "[Receivables][{self_product}][From-{payer_role}]"
      posting_rules:
        - trigger_id: "fee_processor_services"
          source_ledger_ref: "processor_fee_receivable"
          destination_ledger_ref: "processor_fee_receivable"
          amount_basis: "fee_amount"
          value_date_policy: "next_month_day_plus_x"
          value_date_offset_days: 5
      value_container_construction:
        - container_ref: "processor_settlement_container"
          path_pattern: "[Container][{self_product}][Settlement]"
      asset_transfer_rules: []
      fee_sequences:
        - sequence_id: "processor_fee_sequence"
          fees:
            - fee_id: "fee_processor_services"
              trigger_ids: ["Transact-Purchase-Clearing-Processor", "Transact-Purchase-Refund-Processor"]
              beneficiary_role: "self_agent"
              beneficiary_product_role: "self_product"
              payer_role: "payer_role"
              invoice_issue_date_policy: "next_month_day_plus_x"
              invoice_issue_date_offset_days: 0
              payment_due_date_policy: "next_month_day_plus_x"
              payment_due_date_offset_days: 5
              settlement_value_date_policy: "next_month_day_plus_x"
              settlement_value_date_offset_days: 5
              settlement_trigger_event: "invoice_transaction_event"
              count_cost:
                amount: 0.03
                currency: "USD"
      settlement_demand_sequences: []
      settlement_payment_policies: []
      ledger_value_container_map: []

world:
  vendor_agents:
    - vendor_id: "vendor_alpha"
      vendor_label: "Vendor Alpha"
      operational: true
      products:
        - product_id: "prod_prepaid_alpha"
          product_label: "Alpha Prepaid Card"
          product_class: "RetailPayment-Card-Prepaid"
          onboarding_friction:
            min: 0.1
            max: 0.25
          transaction_friction:
            min: 0.05
            max: 0.15
          pipeline_profile_id: "prepaid_card_pipeline"
          pipeline_role_bindings:
            entity_roles:
              product_role: { product_id: "prod_prepaid_alpha" }
              self_agent: { agent_id: "vendor_alpha" }
              scheme_access_product: { product_id: "prod_scheme_access" }
              processor_services_product: { product_id: "prod_processor_services" }
              cardholder_counterparty: { agent_id: "vendor_alpha" }
            default_product_role: "product_role"
            # Spec 73 §R2: balance enforcement applies to all asset_transfer
            # paths now. customer_funds aggregates cardholder wallets; seed
            # it generously so daily purchase clearing can debit without
            # tripping insufficient-funds (non-sink products cannot go negative).
            value_container_balances:
              - container_ref: "settlement_funds_container"
                opening_amount: 10000000.00
                currency: "USD"
              - container_ref: "customer_funds_container"
                opening_amount: 100000000.00
                currency: "USD"
    - vendor_id: "vendor_scheme"
      vendor_label: "Global Payment Scheme (Sink)"
      operational: true
      products:
        - product_id: "prod_scheme_access"
          product_label: "Scheme-Access Product"
          product_class: "SinkProduct"
          pipeline_profile_id: "scheme_access_pipeline"
          pipeline_role_bindings:
            entity_roles:
              self_agent: { agent_id: "vendor_scheme" }
              self_product: { product_id: "prod_scheme_access" }
              payer_role: { agent_id: "vendor_alpha", product_id: "prod_prepaid_alpha" }
            default_product_role: "self_product"
    - vendor_id: "vendor_processor"
      vendor_label: "Payment Processor (Sink)"
      operational: true
      products:
        - product_id: "prod_processor_services"
          product_label: "Processor-Services Product"
          product_class: "SinkProduct"
          pipeline_profile_id: "processor_services_pipeline"
          pipeline_role_bindings:
            entity_roles:
              self_agent: { agent_id: "vendor_processor" }
              self_product: { product_id: "prod_processor_services" }
              payer_role: { agent_id: "vendor_alpha", product_id: "prod_prepaid_alpha" }
            default_product_role: "self_product"
  pops:
    - pop_id: "pop_main"
      pop_label: "Main Pop Segment"
      pop_count: 10000
      daily_onboard: 0.05
      daily_active: 0.40
      daily_transact_count: 1.2
      daily_transact_amount:
        amount: 22.5
        currency: "USD"
      # Spec 31 §Pop config + ADR-0003 §3: refund-intent generation is Pop-
      # owned. Pop emits refund intents at this share of its purchase volume.
      refund_to_purchase_ratio: 0.01
      product_links:
        - vendor_id: "vendor_alpha"
          product_id: "prod_prepaid_alpha"
          known: true
          onboarded_count: 0

control_defaults:
  accepting_onboard: true
  accepting_transact: true
